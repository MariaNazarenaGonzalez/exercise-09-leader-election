services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: noderegistry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d noderegistry"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-1:
    build: .
    environment:
      NODE_ID: "1"
      DATABASE_URL: postgresql://user:password@db/noderegistry
      PEERS: "http://node-2:8080,http://node-3:8080"
      PORT: "8080"
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  node-2:
    build: .
    environment:
      NODE_ID: "2"
      DATABASE_URL: postgresql://user:password@db/noderegistry
      PEERS: "http://node-1:8080,http://node-3:8080"
      PORT: "8080"
    ports:
      - "8082:8080"
    depends_on:
      db:
        condition: service_healthy

  node-3:
    build: .
    environment:
      NODE_ID: "3"
      DATABASE_URL: postgresql://user:password@db/noderegistry
      PEERS: "http://node-1:8080,http://node-2:8080"
      PORT: "8080"
    ports:
      - "8083:8080"
    depends_on:
      db:
        condition: service_healthy
